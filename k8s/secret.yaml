# Local/demo secret. For anything beyond a local cluster, create it out of
# band instead of committing values:
#   kubectl -n smartgrid create secret generic smartgrid-secrets \
#     --from-literal=POSTGRES_PASSWORD='<strong password>'
# (In GCP, use Secret Manager + the Secret Manager CSI driver.)
apiVersion: v1
kind: Secret
metadata:
  name: smartgrid-secrets
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me-local-only
  SMARTGRID_API_KEY: change-me-api-key
