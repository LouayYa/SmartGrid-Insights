apiVersion: v1
kind: Service
metadata:
  name: meter
spec:
  selector:
    app: meter
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meter
  template:
    metadata:
      labels:
        app: meter
    spec:
      containers:
        - name: meter
          image: smartgrid/meter:local
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "alembic upgrade head && gunicorn app:app --bind 0.0.0.0:8000 --workers 2"]
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartgrid-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@db:5432/smartgrid_registration"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
