apiVersion: v1
kind: Service
metadata:
  name: collection
spec:
  selector:
    app: collection
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collection
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collection
  template:
    metadata:
      labels:
        app: collection
    spec:
      containers:
        - name: collection
          image: smartgrid/collection:local
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8002 --workers 2"]
          ports:
            - containerPort: 8002
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartgrid-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@db:5432/smartgrid_collection"
            - name: DATA_INGESTION_URL
              valueFrom:
                configMapKeyRef:
                  name: smartgrid-config
                  key: DATA_INGESTION_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: smartgrid-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: SMARTGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartgrid-secrets
                  key: SMARTGRID_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
