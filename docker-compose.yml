# SmartGrid Insights — full stack orchestration.
#
# One image per microservice (built from each service's own Dockerfile) plus a
# shared Postgres instance. Copy .env.example to .env and set POSTGRES_PASSWORD,
# then bring the whole system up with:
#
#     docker compose up --build
#
# Then open the UI at http://localhost:8004
#
# Service-to-service calls use the compose service names as hostnames (e.g.
# http://collection:8002) on the private "smartgrid" network — the localhost
# URLs baked into the code are overridden here via environment variables.

# Shared config for the Airflow services (LocalExecutor, metadata DB on the
# shared Postgres, DAGs mounted from ./airflow/dags).
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.5-python3.12
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://postgres:${POSTGRES_PASSWORD}@db:5432/airflow"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_SECRET_KEY:-smartgrid-airflow-secret}"
    # Connections/URLs the DAGs use.
    AIRFLOW_CONN_COLLECTION_DB: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/smartgrid_collection"
    INGESTION_API_URL: "http://ingestion:8001"
    SMARTGRID_API_KEY: "${SMARTGRID_API_KEY:-}"
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/tests:/opt/airflow/tests:ro
    - airflow-logs:/opt/airflow/logs
  networks:
    - smartgrid

services:
  # ---------------------------------------------------------------- database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env (see .env.example)}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates the three per-service databases on first startup.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - smartgrid

  # ------------------------------------------------------------------ kafka
  # Single-node KRaft broker (no ZooKeeper). Reading writes flow through the
  # meter-readings topic: producers are the Data Collection API and the
  # standalone simulator; the collection-consumer service persists to Postgres.
  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      # Internal clients use kafka:9092; host tools (e.g. the simulator
      # client) reach the broker on localhost:9094.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9094:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
    restart: unless-stopped
    networks:
      - smartgrid

  # --------------------------------------------------- meter registration (8000)
  meter:
    build: ./smartgrid-meter-registration/meter-registration-service
    # Apply Alembic migrations before serving.
    command: ["sh", "-c", "alembic upgrade head && gunicorn app:app --bind 0.0.0.0:8000 --workers 2"]
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/smartgrid_registration"
      SMARTGRID_API_KEY: "${SMARTGRID_API_KEY:-}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smartgrid

  # ------------------------------------------------------- data ingestion (8001)
  ingestion:
    build: ./smart-data-ingestion/Cloud_Project_Saif
    # Apply Alembic migrations (incl. the VARCHAR->DATE conversion) before serving.
    command: ["sh", "-c", "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8001 --workers 2"]
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/smartgrid_ingestion"
      SMARTGRID_API_KEY: "${SMARTGRID_API_KEY:-}"
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smartgrid

  # ------------------------------------------------------ data collection (8002)
  collection:
    build: ./smartgrid-data-collection
    # Apply Alembic migrations before serving.
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8002 --workers 2"]
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/smartgrid_collection"
      DATA_INGESTION_URL: "http://ingestion:8001"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      SMARTGRID_API_KEY: "${SMARTGRID_API_KEY:-}"
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      ingestion:
        condition: service_started
    restart: unless-stopped
    networks:
      - smartgrid

  # ------------------------------------- readings consumer (no exposed port)
  # Same image as the collection API, different entrypoint: consumes the
  # meter-readings topic and is the only component that inserts readings.
  collection-consumer:
    build: ./smartgrid-data-collection
    command: ["python", "-m", "app.consumer"]
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/smartgrid_collection"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      # The API's entrypoint runs the Alembic migrations; start after it so
      # the schema exists (restart policy covers any race regardless).
      collection:
        condition: service_started
    restart: unless-stopped
    networks:
      - smartgrid

  # -------------------------------------------------------- data analysis (8003)
  analysis:
    build: ./smartgrid-data-analysis
    environment:
      DATA_COLLECTION_URL: "http://collection:8002"
      SMARTGRID_API_KEY: "${SMARTGRID_API_KEY:-}"
    ports:
      - "8003:8003"
    depends_on:
      collection:
        condition: service_started
    restart: unless-stopped
    networks:
      - smartgrid

  # --------------------------------------------------------------- web UI (8004)
  ui:
    build: ./smartgrid-UI/smart-grid-webui
    environment:
      METER_SERVICE_URL: "http://meter:8000"
      COLLECTION_SERVICE_URL: "http://collection:8002"
      ANALYSIS_SERVICE_URL: "http://analysis:8003"
      SECRET_KEY: "${UI_SECRET_KEY:-smartgrid-client-secret}"
      SMARTGRID_API_KEY: "${SMARTGRID_API_KEY:-}"
    ports:
      - "8004:8004"
    depends_on:
      meter:
        condition: service_started
      collection:
        condition: service_started
      analysis:
        condition: service_started
    restart: unless-stopped
    networks:
      - smartgrid

  # ------------------------------------------------------------- airflow
  # One-shot: migrates the Airflow metadata DB and creates the admin user.
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: "${AIRFLOW_ADMIN_USER:-admin}"
      _AIRFLOW_WWW_USER_PASSWORD: "${AIRFLOW_ADMIN_PASSWORD:-admin}"
    depends_on:
      db:
        condition: service_healthy

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # Airflow UI at http://localhost:8080 (login: admin / $AIRFLOW_ADMIN_PASSWORD)
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  airflow-logs:

networks:
  smartgrid:
    driver: bridge
